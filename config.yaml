bot:
  name: "Tramice721"
  prefix: "!ai"
  locale_default: fr
  timezone: America/Montreal

llm:
  model: qwen2.5:7b-instruct   # global default; admins swap with /model
  # Users can pick their own chat model with /modele (e.g. gemma2:9b).
  # Any model installed in Ollama (`ollama list`) is selectable.
  temperature: 0.7
  max_tokens: 2048
  embed_model: nomic-embed-text

channels:
  log_mode: allowlist          # allowlist | denylist | all
  # Salons de Tramice721 + Salle des cartes (guild 1313325400079728734)
  allowlist:
    - "1313368950641393707"   # Salons de Tramice721
    - "1313860231939494001"   # Salle des cartes
  denylist: []
  summary_channel_id: "1313368950641393707"

features:
  game_simulation: true
  matchmaking: true
  web_fetch: false
  everyone_announcements: false
  tts: true

governance:
  escalation_threshold: 3   # open signalements against one member before admin DM

rate_limit:
  per_user_cooldown_sec: 10
  per_channel_cooldown_sec: 5
  max_queue_depth: 20
  max_message_chars: 4000

rag:
  chunk_size: 800
  chunk_overlap: 120
  collections: [docs, history]

privacy:
  dm_always_private: true
  confidences_never_shared: true

social_norms_defaults:
  dm_always_private: true
  transaction_details_general: true
  personal_addresses_hidden: true
  confidences_never_shared: true

fetch_allowlist:
  - latramice.net
  - la-tramice.net
