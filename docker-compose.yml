# Optional local stack (spec §12 M6): Ollama + the Tramice721 bot.
# The MCP servers run as stdio subprocesses inside the bot container.

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # For GPU: add `deploy.resources.reservations.devices` (nvidia) as needed.

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull qwen2.5:7b-instruct
        ollama pull nomic-embed-text
    restart: "no"

  bot:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      OLLAMA_HOST: http://ollama:11434
      GUILD_ID: ${GUILD_ID:-}
      ADMIN_ROLE_IDS: ${ADMIN_ROLE_IDS:-}
      LOG_JSON: "1"
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs
      - ./config.yaml:/app/config.yaml
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  ollama:
